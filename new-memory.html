<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Memory - In-Sync</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF2D55">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-500.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- New Memory Screen -->
        <div id="new-memory-screen" class="screen">
            <div class="new-memory-container">
                <div class="new-memory-header">
                    <button class="back-btn" id="new-memory-back">←</button>
                    <h1 class="new-memory-title">Create Memory</h1>
                    <p class="new-memory-subtitle">Capture a special moment</p>
                </div>
                <div class="form-section">
                    <label class="input-label">Type</label>
                    <div class="type-grid">
                        <button class="type-chip active" data-type="photo">
                            <span class="type-icon">📷</span>
                            <span class="type-text">Photo</span>
                        </button>
                        <button class="type-chip" data-type="video">
                            <span class="type-icon">🎬</span>
                            <span class="type-text">Video</span>
                        </button>
                        <button class="type-chip" data-type="audio">
                            <span class="type-icon">🎙️</span>
                            <span class="type-text">Audio</span>
                        </button>
                        <button class="type-chip" data-type="letter">
                            <span class="type-icon">💌</span>
                            <span class="type-text">Letter</span>
                        </button>
                        <button class="type-chip" data-type="song">
                            <span class="type-icon">🎵</span>
                            <span class="type-text">Song</span>
                        </button>
                    </div>
                </div>
                <div class="form-section media-section hidden" id="media-section">
                    <label class="input-label">Media</label>
                    <div class="media-picker" id="media-picker">
                        <div class="media-picker-content">
                            <div class="media-icon-circle">
                                <span class="media-icon" id="media-type-icon">📷</span>
                            </div>
                            <span class="media-picker-text" id="media-picker-text">Take or choose photo</span>
                            <span class="media-picker-hint">Tap to browse</span>
                        </div>
                        <div class="media-preview hidden" id="media-preview">
                            <img id="media-preview-img" src="" alt="Preview">
                        </div>
                        <div class="media-attached hidden" id="media-attached">
                            <div class="check-circle">✓</div>
                            <span class="media-attached-text">Media Attached</span>
                        </div>
                    </div>
                    <input type="file" id="file-input" accept="image/*,video/*,audio/*" style="display: none;">
                </div>
                <div class="form-section">
                    <label class="input-label">Title</label>
                    <input type="text" id="memory-title" class="input" placeholder="e.g., Our first sunset walk" maxlength="100">
                    <span class="char-count"><span id="title-count">0</span>/100</span>
                </div>
                <div class="form-section">
                    <label class="input-label">Details <span class="optional">(optional)</span></label>
                    <textarea id="memory-description" class="input textarea" placeholder="Describe this moment, how you felt..."></textarea>
                </div>
                <button id="save-memory-btn" class="btn-primary" disabled>
                    <span class="btn-text">Save Memory</span>
                    <span class="btn-arrow">→</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/router.js"></script>
    <script src="js/new-memory.js"></script>
</body>
</html>
