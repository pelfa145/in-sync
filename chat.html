<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - In-Sync</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF2D55">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-500.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Chat Screen -->
        <div id="chat-screen" class="screen">
            <header class="chat-header">
                <button class="back-btn" id="chat-back">←</button>
                <h1 class="chat-title">Chat</h1>
            </header>
            <div class="no-partner-chat" id="no-partner-chat">
                <span class="empty-icon">💬</span>
                <h2 class="empty-title">No partner yet</h2>
                <p class="empty-text">Pair with your partner to start chatting and sharing memories together.</p>
            </div>
            <div class="chat-messages hidden" id="chat-messages"></div>
            <div class="chat-input-area hidden" id="chat-input-area">
                <div class="chat-input-container">
                    <textarea id="chat-input" class="chat-input" placeholder="Type a message..." rows="1"></textarea>
                    <button class="send-btn" id="send-btn" disabled>↑</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/router.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
