<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Sync</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF2D55">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-500.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    </head>
    <body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="screen">
            <div class="loading-content">
                <div class="loading-logo">♾️</div>
                <div class="loading-spinner"></div>
            </div>
        </div>

        <!-- Auth Screen -->
        <div id="auth-screen" class="screen">
            <div class="auth-container">
                <div class="auth-header">
                    <div class="auth-logo">♾️</div>
                    <h1 class="auth-title">In-Sync</h1>

                    <p class="auth-subtitle" id="auth-subtitle">Welcome back! Sign in to continue</p>
                </div>
                <div class="auth-form">
                    <div id="name-group" class="input-group hidden">
                        <label class="input-label">Your Name</label>
                        <input type="text" id="auth-name" class="input" placeholder="John" autocomplete="name">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Email Address</label>
                        <input type="email" id="auth-email" class="input" placeholder="your@email.com" autocomplete="email">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Password</label>
                        <input type="password" id="auth-password" class="input" placeholder="••••••••" autocomplete="current-password">
                    </div>
                    <div id="auth-error" class="error-container hidden">
                        <span class="error-icon">⚠️</span>
                        <span class="error-text" id="auth-error-text"></span>
                    </div>
                    <button id="auth-submit" class="btn-primary">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-arrow">→</span>
                    </button>
                    <button id="auth-toggle" class="btn-text-link">
                        Don't have an account? <span id="auth-toggle-link">Sign up</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
